{% extends 'plantilla.html' %}

{% block title %} Crear grupo {% endblock %}
{% block body %}
    <div class="titulo-az">
        <h2>Registrar Grupo</h2>
    </div>
    
    <form method="post">
        {% csrf_token %}
        <div class="card-individual">
            <div class="tabla-individual">
                <div class="form-group">
                    {{ form.as_p }}
                </div>
            </div>
        </div>

        <div class="submit-container">
            <button type="submit" class="btn-guardar">Guardar</button>
            <a href="{% url 'lista_grupos' %}" class="btn-cancelar">Cancelar</a>
        </div>
    </form>
{% endblock %}
