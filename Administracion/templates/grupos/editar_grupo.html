{% extends 'plantilla.html' %}

{% block title %} Editar grupo {% endblock %}
{% block body %}

    <div class="titulo-Ama">
        <h2>Editar Grupo</h2>
    </div>
    

    <form method="post">
        {% csrf_token %}

        <div class="card-individual">
            <div class="tabla-individual">
                <div class="form-group">
                    {{ form.as_p }}
                </div>
            </div>
        </div>

        <div class="submit-container">
            <button type="submit" class="btn-guardar">Actualizar</button>
            <a href="{% url 'lista_grupos' %}" class="btn-cancelar">Cancelar</a>
        </div>
    </form>

{% endblock %}
