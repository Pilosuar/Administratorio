{% extends 'plantilla.html' %}


{% block title %} Crear curso {% endblock %}

{% block body %}
    <h1>Registrar Curso</h1>

    <form method="post">
        {% csrf_token %}

        {{ form.as_p }}

        <button type="submit">Guardar</button>
        <a href="{% url 'lista_cursos' %}">Cancelar</a>
    </form>

{% endblock %}
